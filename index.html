<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>在庫管理（materials）</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="title">
          <h1>在庫管理</h1>
          <p class="subtitle">Supabase / materials</p>
        </div>

        <div class="toolbar">
          <button id="btnRefresh" class="btn">更新</button>
          <button id="btnAddRow" class="btn btnPrimary">新規行を追加</button>
          <span id="status" class="status" aria-live="polite"></span>
        </div>
      </header>

      <main class="main">
        <section class="sheet">
          <div class="sheetHeader">
            <div class="sheetName">materials</div>
            <div class="sheetHint">セルをクリックして選択できます（編集は「新規行」から）。</div>
          </div>

          <div class="tableWrap" role="region" aria-label="在庫一覧">
            <table class="grid" aria-describedby="gridHelp">
              <thead>
                <tr>
                  <th>symbol</th>
                  <th>diameter</th>
                  <th>thickness</th>
                  <th>coating-type</th>
                  <th class="num">quantity</th>
                  <th>updated-at</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
          <p id="gridHelp" class="srOnly">
            在庫一覧テーブルです。上部のボタンから更新・新規登録ができます。
          </p>
        </section>
      </main>

      <footer class="footer">
        <span>HTML / CSS / JavaScript（Reactなし）</span>
      </footer>
    </div>

    <dialog id="dialogAdd" class="dialog">
      <form id="formAdd" method="dialog" class="dialogBody">
        <div class="dialogTitle">materials に新規登録</div>

        <div class="formGrid">
          <label class="field">
            <span class="label">symbol</span>
            <input name="symbol" type="text" required autocomplete="off" />
          </label>
          <label class="field">
            <span class="label">diameter</span>
            <input name="diameter" type="number" step="0.001" min="0" required />
          </label>
          <label class="field">
            <span class="label">thickness</span>
            <input name="thickness" type="number" step="0.001" min="0" required />
          </label>
          <label class="field">
            <span class="label">coating-type</span>
            <input name="coating_type" type="text" autocomplete="off" />
          </label>
          <label class="field">
            <span class="label">quantity</span>
            <input name="quantity" type="number" step="1" min="0" required />
          </label>
        </div>

        <div class="dialogActions">
          <button value="cancel" class="btn">キャンセル</button>
          <button id="btnSubmitAdd" value="default" class="btn btnPrimary" type="submit">
            登録
          </button>
        </div>
        <p class="dialogNote">
          ※ DB列名は <code>coating_type</code> / <code>updated_at</code> を想定しています。
        </p>
      </form>
    </dialog>

    <script type="module" src="./main.js"></script>
  </body>
</html>
