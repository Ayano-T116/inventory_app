<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>在庫管理（materials）</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="title">
          <h1>在庫管理</h1>
          <p class="subtitle">Supabase / materials</p>
        </div>

        <div class="toolbar">
          <button id="btnRefresh" class="btn">更新</button>
          <button id="btnAddRow" class="btn btnPrimary">新規行を追加</button>
          <span id="status" class="status" aria-live="polite"></span>
        </div>
      </header>

      <main class="main">
        <section class="sheet">

          <div class="tableWrap" role="region" aria-label="在庫一覧">
            <div id="groupContainer" class="groupContainer"></div>
          </div>
          <!-- 
            この要素はスクリーンリーダー（視覚障害者向け補助技術）でのみ読み上げられる案内文です。
            視覚的には表示されませんが、アクセシビリティ向上のために存在しています。
          -->
          <p id="gridHelp" class="srOnly">
            在庫一覧です。記号ごとにテーブルが並びます。数量のセルに直接入力し、更新ボタンを押してください。上部のボタンから新規行登録ができます。
          </p>
        </section>
      </main>

      <footer class="footer">
        <span>HTML / CSS / JavaScript（Reactなし）</span>
      </footer>
    </div>

    <dialog id="dialogAdd" class="dialog">
      <form id="formAdd" method="dialog" class="dialogBody">
        <div class="dialogTitle">materials に新規登録</div>

        <div class="formGrid">
          <label class="field">
            <span class="label">記号</span>
            <input name="symbol" type="text" required autocomplete="off" />
          </label>
          <label class="field">
            <span class="label">口径</span>
            <input name="diameter" type="number" step="0.001" min="0" required />
          </label>
          <label class="field">
            <span class="label">厚み</span>
            <input name="thickness" type="number" step="0.001" min="0" required />
          </label>
          <label class="field">
            <span class="label">表被仕様</span>
            <input name="coating_type" type="text" autocomplete="off" />
          </label>
          <label class="field">
            <span class="label">数量</span>
            <input name="quantity" type="number" step="1" min="0" required />
          </label>
        </div>

        <div class="dialogActions">
          <button value="cancel" class="btn">キャンセル</button>
          <button id="btnSubmitAdd" value="default" class="btn btnPrimary" type="submit">
            登録
          </button>
        </div>
        <p class="dialogNote">
          ※ 更新日は自動で入力されます。
        </p>
      </form>
    </dialog>

    <script type="module" src="./main.js"></script>
  </body>
</html>
